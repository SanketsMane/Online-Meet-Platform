<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <title>Verify Access - Kidokool</title>
    <link rel="shortcut icon" href="../images/logo.svg" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Premium Fonts & Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#3b68f8',
                            600: '#355de0',
                        }
                    }
                }
            }
        };
    </script>
    
    <!-- Functional Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.8"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .otp-input:focus { border-color: #3b68f8; box-shadow: 0 0 0 4px rgba(59, 104, 248, 0.1); }
    </style>
</head>
<body class="dark:bg-slate-950 bg-slate-50 min-h-screen flex flex-col transition-colors duration-300 antialiased font-sans">
    
    <div class="flex-1 flex items-center justify-center p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-white to-slate-50 dark:from-slate-900 dark:via-slate-950 dark:to-slate-900">
        <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
            
            <div class="text-center mb-10">
                <img src="../images/logo.svg" alt="Kidokool" class="h-10 mx-auto mb-6" />
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight font-heading">Verify Your Account</h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Enter the 6-digit code sent to <span id="displayEmail" class="text-brand-500">your email</span></p>
            </div>

            <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-2xl rounded-[32px] p-8">
                <form id="verifyForm" class="space-y-8">
                    <!-- OTP Input Container -->
                    <div class="flex justify-between gap-2 digit-group">
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-xl font-bold rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 dark:text-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all" autofocus />
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-xl font-bold rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 dark:text-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all" />
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-xl font-bold rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 dark:text-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all" />
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-xl font-bold rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 dark:text-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all" />
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-xl font-bold rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 dark:text-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all" />
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-xl font-bold rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 dark:text-white focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all" />
                    </div>

                    <button type="submit" id="verifyBtn" class="w-full py-4 rounded-2xl bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm shadow-xl shadow-brand-500/20 transition-all hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2">
                        <span>Validate Code</span>
                        <i class="fas fa-check-circle text-[10px]"></i>
                    </button>
                </form>

                <div class="mt-8 text-center pt-8 border-t border-slate-100 dark:border-slate-800">
                    <p class="text-sm text-slate-500 dark:text-slate-400">
                        Didn't receive code? 
                        <button id="resendBtn" onclick="resendOtp()" class="font-bold text-brand-600 hover:text-brand-700 transition-colors">Resend OTP</button>
                    </p>
                    <div id="resendTimer" class="text-xs text-slate-400 mt-2 hidden">Available in <span id="timerSeconds">30</span>s</div>
                </div>
            </div>

            <div class="mt-8 text-center">
                <a href="/login.html" class="text-xs font-bold text-slate-400 hover:text-brand-600 transition-all inline-flex items-center gap-2">
                    <i class="fas fa-arrow-left text-[10px]"></i>
                    Return to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const displayEmail = document.getElementById('displayEmail');
        if (email) displayEmail.textContent = email;

        // OTP Input Navigation Logic
        const inputs = document.querySelectorAll('.digit-group input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) inputs[index + 1].focus();
                } else if (e.key === 'Backspace') {
                    if (index > 0) inputs[index - 1].focus();
                }
            });
        });

        // Form Submission
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = Array.from(inputs).map(i => i.value).join('');
            if (otp.length < 6) return Swal.fire('Error', 'Please enter full 6-digit code', 'warning');

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validating...';

            try {
                // Determine if we are verifying a Tenant (Host) or a standard user
                // For this project, we target the Host Login flow
                const response = await axios.post('/api/v1/auth/host/otp/login', { username: email, otp });
                
                if (response.data && response.data.token) {
                    localStorage.setItem('token', response.data.token);
                    await Swal.fire({
                        icon: 'success',
                        title: 'Verified!',
                        text: 'Welcome to your Host Dashboard',
                        timer: 2000,
                        showConfirmButton: false
                    });
                    window.location.href = '/';
                }
            } catch (err) {
                Swal.fire('Verification Failed', err.response?.data?.message || 'Invalid or expired code', 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>Validate Code</span><i class="fas fa-check-circle text-[10px]"></i>';
            }
        });

        // Resend Logic
        async function resendOtp() {
            const btn = document.getElementById('resendBtn');
            const timerDiv = document.getElementById('resendTimer');
            const timerSec = document.getElementById('timerSeconds');

            try {
                await axios.post('/api/v1/auth/otp/send', { email });
                Swal.fire('Sent!', 'Check your inbox for the new code', 'success');
                
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                timerDiv.classList.remove('hidden');

                let timeLeft = 60;
                const interval = setInterval(() => {
                    timeLeft--;
                    timerSec.textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        btn.disabled = false;
                        btn.classList.remove('opacity-50', 'cursor-not-allowed');
                        timerDiv.classList.add('hidden');
                    }
                }, 1000);
            } catch (err) {
                Swal.fire('Error', 'Failed to resend code', 'error');
            }
        }

        // Initialize Theme from localStorage
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
