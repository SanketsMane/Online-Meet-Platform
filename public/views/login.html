<!doctype html>
<html lang="en" class="no-js">
    <head>
        <title id="title">tawktoo - Host Portal</title>
        <link id="icon" rel="shortcut icon" href="../images/logo.svg" />
        <link id="appleTouchIcon" rel="apple-touch-icon" href="../images/logo.svg" />
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="tawktoo Host Portal - Secure access for meeting hosts and presenters" />

        <!-- Premium Fonts & Icons -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

        <!-- Tailwind Configuration -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Inter', 'sans-serif'],
                            heading: ['Outfit', 'sans-serif'],
                        },
                        colors: {
                            brand: {
                                50: '#f5f7ff',
                                100: '#ebf0fe',
                                200: '#ced9fd',
                                300: '#b1c2fc',
                                400: '#7695fa',
                                500: '#3b68f8',
                                600: '#355de0',
                                700: '#2c4ebb',
                                800: '#233e95',
                                900: '#1d337a',
                            },
                            slate: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        },
                    },
                },
            };
        </script>

        <!-- Functional Scripts -->
        <script defer src="../js/Brand.js"></script>
        <script defer src="../js/Theme.js"></script>
        <script defer src="../js/components.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.8"></script>

        <style>
            body {
                font-family: 'Inter', sans-serif;
            }

            /* Custom scrollbar */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 9999px;
            }

            .dark ::-webkit-scrollbar-thumb {
                background: #334155;
            }
        </style>
    </head>
    <body class="dark:bg-slate-950 transition-colors duration-300 antialiased min-h-screen flex flex-col">
        <header class="site-header-shared" data-type="auth"></header>
        <!-- Auth View -->
        <div
            class="flex-1 flex items-center justify-center p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-white to-slate-50 dark:from-slate-900 dark:via-slate-950 dark:to-slate-900"
        >
            <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
                <div class="text-center mb-10">
                    <img id="logo" src="../images/logo.svg" alt="tawktoo" class="h-10 mx-auto mb-6" />
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight font-heading">
                        Host Portal
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">Secure access to your meetings</p>
                </div>

                <div
                    class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-2xl transition-all duration-300 rounded-[32px] p-8"
                >
                    <!-- Tab Switcher -->
                    <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-8">
                        <button
                            onclick="switchTab('login')"
                            id="loginTabBtn"
                            class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-200 bg-white dark:bg-slate-700 text-brand-600 dark:text-white shadow-sm"
                        >
                            Sign In
                        </button>
                        <button
                            onclick="switchTab('register')"
                            id="registerTabBtn"
                            class="flex-1 py-3 text-sm font-semibold rounded-xl transition-all duration-200 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200"
                        >
                            Create Account
                        </button>
                    </div>

                    <!-- Login Form -->
                    <div id="loginPanel" class="space-y-6">
                        <form id="loginForm" class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Username</label>
                                <div class="relative">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400"
                                    >
                                        <i class="fas fa-at text-xs"></i>
                                    </div>
                                    <input
                                        id="username"
                                        type="text"
                                        required
                                        class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all text-sm dark:text-white pl-10"
                                        placeholder="your_handle"
                                    />
                                </div>
                            </div>

                            <!-- Password Section -->
                            <div id="passwordSection" class="space-y-2">
                                <div class="flex justify-between items-center">
                                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Password</label>
                                    <div class="flex gap-3">
                                        <a
                                            href="javascript:void(0)"
                                            onclick="toggleAuthMode('otp')"
                                            class="text-xs font-semibold text-brand-600 hover:text-brand-700 transition-colors"
                                            >Login with OTP</a
                                        >
                                        <span class="text-slate-300 dark:text-slate-700">|</span>
                                        <a
                                            href="javascript:void(0)"
                                            onclick="handleForgotPassword()"
                                            class="text-xs font-semibold text-brand-600 hover:text-brand-700 transition-colors"
                                            >Forgot?</a
                                        >
                                    </div>
                                </div>
                                <div class="relative">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400"
                                    >
                                        <i class="fas fa-lock text-xs"></i>
                                    </div>
                                    <input
                                        id="password"
                                        type="password"
                                        class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all text-sm dark:text-white pl-10 pr-12"
                                        placeholder="••••••••"
                                    />
                                    <button
                                        type="button"
                                        id="togglePassword"
                                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-brand-500 transition-colors cursor-pointer z-10"
                                    >
                                        <i class="fas fa-eye text-xs"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- OTP Section -->
                            <div id="otpSection" class="space-y-2 hidden">
                                <div class="flex justify-between items-center">
                                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Verification Code</label>
                                    <a
                                        href="javascript:void(0)"
                                        onclick="toggleAuthMode('password')"
                                        class="text-xs font-semibold text-brand-600 hover:text-brand-700 transition-colors"
                                        >Sign in with Password</a
                                    >
                                </div>
                                <div class="flex gap-2">
                                    <div class="relative flex-1">
                                        <div
                                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400"
                                        >
                                            <i class="fas fa-shield-alt text-xs"></i>
                                        </div>
                                        <input
                                            id="otpCode"
                                            type="text"
                                            class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all text-sm dark:text-white pl-10"
                                            placeholder="6-digit code"
                                            maxlength="6"
                                        />
                                    </div>
                                    <button
                                        type="button"
                                        id="sendOtpBtn"
                                        onclick="sendOtp()"
                                        class="px-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-xs hover:bg-slate-200 dark:hover:bg-slate-700 transition-all active:scale-95"
                                    >
                                        Get Code
                                    </button>
                                </div>
                            </div>

                            <button
                                type="submit"
                                id="loginButton"
                                class="w-full py-4 rounded-2xl bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm shadow-xl shadow-brand-500/20 transition-all hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2"
                            >
                                <span>Sign In to Dashboard</span>
                                <i class="fas fa-arrow-right text-[10px]"></i>
                            </button>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div id="registerPanel" class="hidden space-y-6">
                        <form id="registerForm" class="space-y-5">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700 dark:text-slate-300"
                                    >Desired Username</label
                                >
                                <input
                                    id="regUsername"
                                    type="text"
                                    required
                                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all text-sm dark:text-white"
                                    placeholder="your_handle"
                                />
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Display Name</label>
                                <input
                                    id="regDisplayname"
                                    type="text"
                                    required
                                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all text-sm dark:text-white"
                                    placeholder="E.g. John Smith"
                                />
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700 dark:text-slate-300"
                                    >Master Password</label
                                >
                                <input
                                    id="regPassword"
                                    type="password"
                                    required
                                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all text-sm dark:text-white"
                                    placeholder="••••••••"
                                />
                            </div>
                            <button
                                type="submit"
                                id="registerButton"
                                class="w-full py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm shadow-xl shadow-emerald-500/20 transition-all hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2"
                            >
                                <span>Create Host Account</span>
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </form>
                    </div>

                    <div class="mt-10 text-center pt-8 border-t border-slate-100 dark:border-slate-800">
                        <a
                            href="/"
                            class="text-xs font-bold text-slate-400 hover:text-brand-600 dark:hover:text-brand-400 transition-all inline-flex items-center gap-2 group"
                        >
                            <i
                                class="fas fa-arrow-left text-[10px] group-hover:-translate-x-1 transition-transform"
                            ></i>
                            Back to Home
                        </a>
                    </div>
                </div>

            </div>
        </div>
        <footer class="site-footer-shared"></footer>

        <!-- Authentication Logic -->
        <script>
            // Author: Sanket - Tab switching logic
            function switchTab(tab) {
                const loginPanel = document.getElementById('loginPanel');
                const registerPanel = document.getElementById('registerPanel');
                const loginBtn = document.getElementById('loginTabBtn');
                const regBtn = document.getElementById('registerTabBtn');

                const activeClasses = 'bg-white dark:bg-slate-700 text-brand-600 dark:text-white shadow-sm font-bold';
                const inactiveClasses =
                    'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 font-semibold';

                loginPanel.classList.toggle('hidden', tab !== 'login');
                registerPanel.classList.toggle('hidden', tab === 'login');

                if (tab === 'login') {
                    loginBtn.className = `flex-1 py-3 text-sm rounded-xl transition-all duration-200 ${activeClasses}`;
                    regBtn.className = `flex-1 py-3 text-sm rounded-xl transition-all duration-200 ${inactiveClasses}`;
                } else {
                    loginBtn.className = `flex-1 py-3 text-sm rounded-xl transition-all duration-200 ${inactiveClasses}`;
                    regBtn.className = `flex-1 py-3 text-sm rounded-xl transition-all duration-200 ${activeClasses}`;
                }
            }

            // Author: Sanket - Auth mode toggle (Password vs OTP)
            let authMode = 'password';
            function toggleAuthMode(mode) {
                authMode = mode;
                document.getElementById('passwordSection').classList.toggle('hidden', mode !== 'password');
                document.getElementById('otpSection').classList.toggle('hidden', mode !== 'otp');
                document.getElementById('password').required = mode === 'password';
                document.getElementById('otpCode').required = mode === 'otp';
            }

            // Author: Sanket - Send OTP
            async function sendOtp() {
                const username = document.getElementById('username').value.trim();
                const sendBtn = document.getElementById('sendOtpBtn');
                
                if (!username) {
                    return Swal.fire({ icon: 'warning', title: 'Username required', text: 'Enter your username/email first' });
                }

                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                try {
                    const res = await axios.post('/api/v1/auth/host/otp/send', { username });
                    Swal.fire({ icon: 'success', title: 'Code Sent', text: res.data.message });
                    
                    // Countdown for resend
                    let timeLeft = 60;
                    const timer = setInterval(() => {
                        timeLeft--;
                        sendBtn.textContent = `Resend (${timeLeft}s)`;
                        if (timeLeft <= 0) {
                            clearInterval(timer);
                            sendBtn.disabled = false;
                            sendBtn.textContent = 'Get Code';
                        }
                    }, 1000);
                } catch (err) {
                    Swal.fire({ icon: 'error', title: 'Failed', text: err.response?.data?.message || 'Check connection' });
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Get Code';
                }
            }

            // Author: Sanket - Core Authentication Logic
            document.addEventListener('DOMContentLoaded', function () {
                const loginForm = document.getElementById('loginForm');
                const loginButton = document.getElementById('loginButton');
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const otpInput = document.getElementById('otpCode');

                const registerForm = document.getElementById('registerForm');
                const registerButton = document.getElementById('registerButton');
                const regUsernameInput = document.getElementById('regUsername');
                const regDisplaynameInput = document.getElementById('regDisplayname');
                const regPasswordInput = document.getElementById('regPassword');

                // Theme Toggle
                const themeToggle = document.getElementById('themeToggle');
                themeToggle.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark');
                    localStorage.setItem(
                        'theme',
                        document.documentElement.classList.contains('dark') ? 'dark' : 'light'
                    );
                });

                // Set initial theme
                if (
                    localStorage.getItem('theme') === 'dark' ||
                    (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
                ) {
                    document.documentElement.classList.add('dark');
                }

                // Password toggle - Refined by Sanket
                const togglePassword = document.getElementById('togglePassword');
                togglePassword.addEventListener('click', function (e) {
                    e.preventDefault(); e.stopPropagation();
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-eye', 'fa-eye-slash');
                        icon.classList.add(type === 'password' ? 'fa-eye' : 'fa-eye-slash');
                    }
                });

                // Login handler - Supports both Password and OTP - Author: Sanket
                loginForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    const username = usernameInput.value.trim();
                    const password = passwordInput.value;
                    const otp = otpInput.value.trim();

                    if (!username) return;

                    loginButton.disabled = true;
                    loginButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i><span>Authenticating...</span>';

                    try {
                        const endpoint = authMode === 'password' ? '/login' : '/api/v1/auth/host/otp/login';
                        const payload = authMode === 'password' ? { username, password } : { username, otp };
                        
                        const response = await axios.post(endpoint, payload);
                        if (response.data && response.data.message) {
                            localStorage.setItem('token', response.data.message);
                            await Swal.fire({
                                icon: 'success',
                                title: 'Access Authorized',
                                text: `Welcome back, ${response.data.displayname || username}`,
                                timer: 2000,
                                showConfirmButton: false,
                                customClass: {
                                    popup: 'rounded-[32px] dark:bg-slate-900 dark:text-white border border-brand-500/20 text-center',
                                },
                            });
                            window.location.href = '/';
                        }
                    } catch (error) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Access Denied',
                            text: error.response?.data?.message || 'Please check your credentials.',
                            confirmButtonColor: '#3b68f8',
                            customClass: { popup: 'rounded-[32px] dark:bg-slate-900 dark:text-white' },
                        });
                    } finally {
                        loginButton.disabled = false;
                        loginButton.innerHTML =
                            '<span>Sign In to Dashboard</span><i class="fas fa-arrow-right text-[10px] ml-2"></i>';
                    }
                });

                // Registration handler
                registerForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    const username = regUsernameInput.value.trim();
                    const displayname = regDisplaynameInput.value.trim();
                    const password = regPasswordInput.value;

                    registerButton.disabled = true;
                    registerButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i><span>Creating...</span>';

                    try {
                        const response = await axios.post('/api/v1/user/register', { username, displayname, password });
                        if (response.status === 201) {
                            await Swal.fire({
                                icon: 'success',
                                title: 'Account Created',
                                text: 'Your host account has been successfully established.',
                                timer: 2000,
                                showConfirmButton: false,
                                customClass: {
                                    popup: 'rounded-[32px] dark:bg-slate-900 dark:text-white border border-emerald-500/20 text-center',
                                },
                            });
                            switchTab('login');
                            usernameInput.value = username;
                        }
                    } catch (error) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Registration Failed',
                            text: error.response?.data?.message || 'Integrity check failed.',
                            confirmButtonColor: '#10b981',
                            customClass: { popup: 'rounded-[32px] dark:bg-slate-900 dark:text-white' },
                        });
                    } finally {
                        registerButton.disabled = false;
                        registerButton.innerHTML =
                            '<span>Create Host Account</span><i class="fas fa-plus text-[10px]"></i>';
                    }
                });
            });

            // Author: Sanket - Recovery info
            function handleForgotPassword() {
                Swal.fire({
                    title: 'Authentication Recovery',
                    text: 'Automated recovery is restricted. Please contact your system administrator for manual credential reset.',
                    icon: 'info',
                    confirmButtonText: 'I Understand',
                    confirmButtonColor: '#3b68f8',
                    customClass: { popup: 'rounded-[32px] dark:bg-slate-900 dark:text-white text-center' },
                });
            }
        </script>
    </body>
</html>
