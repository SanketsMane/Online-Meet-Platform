<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Page | tawktoo</title>
    <link id="pageIcon" rel="shortcut icon" href="../images/logo.svg" />
    
    <!-- StyleSheet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700|Outfit:600,700" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <link rel="stylesheet" type="text/css" href="../css/theme.css" />

    <!-- Tailwind Configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prose img { border-radius: 1rem; }
        .prose a { color: #3b82f6; text-decoration: none; }
        .prose a:hover { text-decoration: underline; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">
    <!-- Navbar -->
    <header class="sticky top-0 z-50 glass-card border-b">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 group">
                <img id="navbarLogo" src="../images/logo.svg" alt="logo" class="h-8 w-auto transition-transform group-hover:scale-105" />
                <span id="navbarTitle" class="text-xl font-bold font-heading tracking-tight text-gray-900 dark:text-white">tawktoo</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm font-medium hover:text-blue-600 transition-colors">Home</a>
                <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="fa-solid fa-moon dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-6 py-12 max-w-4xl">
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="text-gray-500 animate-pulse">Loading content...</p>
        </div>

        <article id="contentWrapper" class="hidden animate__animated animate__fadeIn">
            <h1 id="mainTitle" class="text-4xl md:text-5xl font-bold font-heading mb-8 text-gray-900 dark:text-white leading-tight"></h1>
            <div id="pageContent" class="prose prose-lg dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 leading-relaxed space-y-6">
                <!-- Content injected here -->
            </div>
        </article>

        <div id="error" class="hidden text-center py-20 space-y-6 animate__animated animate__fadeIn">
            <div class="inline-flex items-center justify-center h-20 w-20 rounded-full bg-red-100 text-red-600 mb-4">
                <i class="fa-solid fa-circle-exclamation text-3xl"></i>
            </div>
            <h2 class="text-3xl font-bold font-heading">Page Not Found</h2>
            <p class="text-gray-500 max-w-md mx-auto">The page you're looking for was moved, removed, or never existed.</p>
            <a href="/" class="inline-block px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all hover:shadow-lg hover:-translate-y-0.5">
                Go back Home
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-100 dark:border-gray-800 py-12 bg-white dark:bg-gray-900">
        <div class="container mx-auto px-6 text-center">
            <p id="footerCopyright" class="text-gray-500 dark:text-gray-400 text-sm italic">
                &copy; 2026 tawktoo. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="../js/Theme.js"></script>
    <script>
        // CMS Page Loader - Author: Sanket
        document.addEventListener('DOMContentLoaded', async () => {
            const slug = window.location.pathname.split('/').pop();
            const loading = document.getElementById('loading');
            const contentWrapper = document.getElementById('contentWrapper');
            const error = document.getElementById('error');
            const pageTitle = document.getElementById('pageTitle');
            const mainTitle = document.getElementById('mainTitle');
            const pageContent = document.getElementById('pageContent');

            try {
                // Fetch Branding
                const brandRes = await fetch('/api/v1/branding');
                const brand = await brandRes.json();
                if (brand.app_name) {
                    document.getElementById('navbarTitle').innerText = brand.app_name;
                    document.getElementById('footerCopyright').innerHTML = `&copy; ${new Date().getFullYear()} ${brand.app_name}. All rights reserved.`;
                }
                if (brand.logo_url) {
                    document.getElementById('navbarLogo').src = brand.logo_url;
                    document.getElementById('pageIcon').href = brand.logo_url;
                }
                if (brand.brand_color) {
                    document.documentElement.style.setProperty('--brand-color', brand.brand_color);
                }

                // Fetch Page Content
                const res = await fetch(`/api/v1/public/pages/${slug}`);
                if (!res.ok) throw new Error('Not Found');
                
                const page = await res.json();
                
                pageTitle.innerText = `${page.title} | ${brand.app_name || 'tawktoo'}`;
                mainTitle.innerText = page.title;
                pageContent.innerHTML = page.content;

                loading.classList.add('hidden');
                contentWrapper.classList.remove('hidden');
            } catch (err) {
                console.error('Failed to load page:', err);
                loading.classList.add('hidden');
                error.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
